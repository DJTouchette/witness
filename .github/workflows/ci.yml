name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Gofmt
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)

      - name: Build
        run: go build ./cmd/witness

      - name: Test
        run: go test ./... -count=1

      - name: Vet
        run: go vet ./...
