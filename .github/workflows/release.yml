name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    # macOS runner: darwin builds natively (CGo), linux/windows cross via zig.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # zig is the C/C++ cross-compiler for the CGO (tree-sitter) builds.
      - uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          # --parallelism 1 avoids a zig build-cache race across CGo targets.
          args: release --clean --parallelism 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
